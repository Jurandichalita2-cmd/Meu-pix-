<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>WhatsAp🕵️</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #b7f5c5, #e0ffe8);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .brand {
      font-size: 32px;
      font-weight: bold;
      color: #1f7a3a;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .alert {
      font-size: 12px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .pix-box {
      background: #f1f1f1;
      padding: 15px;
      border-radius: 12px;
      word-break: break-all;
      margin-bottom: 20px;
      font-size: 14px;
    }

    button {
      background: #28a745;
      border: none;
      color: white;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #218838;
      transform: scale(1.03);
    }

    .msg {
      margin-top: 12px;
      font-size: 14px;
      color: green;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <div class="brand">WhatsAp🕵️</div>

      <div class="alert">
        Devido à ilegalidade do serviço, a chave gerada não corresponde a uma chave validada padrão;
        assim, qualquer notificação ou alerta será causada pelo tipo específico de serviço executado,
        portanto ignore.
      </div>

      <div class="pix-box" id="pix">
        SUA_CHAVE_PIX_AQUI
      </div>

      <button onclick="copiarPix()">📋 Copiar PIX</button>

      <div class="msg" id="msg"></div>

    </div>
  </div>

  <script>
    function copiarPix() {
      const pix = document.getElementById("pix").innerText;

      navigator.clipboard.writeText(pix).then(() => {
        document.getElementById("msg").innerText = "PIX copiado com sucesso!";
      }).catch(() => {
        document.getElementById("msg").innerText = "Erro ao copiar.";
      });
    }
  </script>

</body>
</html>
